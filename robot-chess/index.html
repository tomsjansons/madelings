<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070a0f" />
    <title>Checkmate Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main>
      <header>
        <a class="brand" href="#" aria-label="Checkmate Protocol home">
          <span class="brand-icon"><i></i><i></i><i></i><i></i></span>
          <span>CHECKMATE <b>PROTOCOL</b></span>
        </a>
        <div class="round">AUTONOMOUS CHESS LEAGUE <span>•</span> ROUND 07</div>
        <div class="live"><i></i> LIVE SIMULATION</div>
      </header>

      <section class="arena">
        <aside class="player player-a">
          <div class="number">01</div>
          <div class="portrait orange"><span>R1</span></div>
          <p>TACTICAL UNIT</p>
          <h2>AXIOM</h2>
          <div class="rating"><span>ELO</span><b>2847</b></div>
          <div class="clock" id="white-clock">09:42</div>
        </aside>

        <div id="scene" aria-label="Animated 3D scene of two robots playing chess">
          <div class="scanlines"></div>
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <div class="move-badge"><span id="move-number">MOVE 01</span><b id="move-label">E2 — E4</b></div>
          <div class="hint">DRAG TO ORBIT · SCROLL TO ZOOM</div>
        </div>

        <aside class="player player-b">
          <div class="number">02</div>
          <div class="portrait blue"><span>R2</span></div>
          <p>STRATEGIC UNIT</p>
          <h2>VEKTOR</h2>
          <div class="rating"><span>ELO</span><b>2819</b></div>
          <div class="clock" id="black-clock">09:38</div>
        </aside>
      </section>

      <footer>
        <div class="evaluation"><span>AXIOM</span><div><i></i></div><b>+0.18</b></div>
        <div class="controls">
          <button id="toggle" type="button"><span>Ⅱ</span> PAUSE</button>
          <button id="restart" type="button"><span>↻</span> RESTART MATCH</button>
          <button id="theme-toggle" type="button" aria-label="Switch to light mode"><span>☼</span> LIGHT MODE</button>
        </div>
        <div class="system"><span>ENGINE</span><b>NEURAL CORE v4.2</b><i></i></div>
      </footer>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
